services:
  describarr:
    build: .
    container_name: describarr
    environment:
      - AUDIOVAULT_EMAIL=${AUDIOVAULT_EMAIL}
      - AUDIOVAULT_PASSWORD=${AUDIOVAULT_PASSWORD}
      - DESCRIBARR_MIN_SCORE=${DESCRIBARR_MIN_SCORE:-65}
    volumes:
      # Mount the same media paths that Sonarr/Radarr use inside their containers.
      # These must match the container-side paths exactly (e.g. /tv, /movies).
      - /path/to/tv:/tv
      - /path/to/movies:/movies
      # Persist the download cache and done-episode tracking across rebuilds.
      # Without this, every image rebuild wipes the cache and done files,
      # causing the retry endpoint to re-process already-merged episodes.
      - /path/to/describarr-cache:/root/.cache/describarr
    networks:
      - arr-network   # must be the same network as Sonarr/Radarr
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.describarr.rule=Host(`describarr.example.com`)
      - traefik.http.routers.describarr.entrypoints=websecure
      - traefik.http.routers.describarr.tls=true
      - traefik.http.routers.describarr.middlewares=sso@file
      - traefik.http.services.describarr.loadbalancer.server.port=8686
      # Favicon bypass — prevents SSO CSRF race condition on first load
      - traefik.http.routers.describarr-favicon.rule=Host(`describarr.example.com`) && PathPrefix(`/favicon`)
      - traefik.http.routers.describarr-favicon.priority=100
      - traefik.http.routers.describarr-favicon.entrypoints=websecure
      - traefik.http.routers.describarr-favicon.tls=true
      - traefik.http.routers.describarr-favicon.service=describarr

networks:
  arr-network:
    external: true
